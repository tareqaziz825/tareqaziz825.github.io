<section class="sec sec-alt2">
  <div class="wrap">
    <p class="sec-kicker reveal">Get In Touch</p>
    <h2 class="sec-h reveal">Let's <em>Connect</em></h2>
    <div class="connect-grid reveal reveal-d1">

      <!-- Left: socials + contact info -->
      <div>
        <p class="c-lbl">Find me on the web</p>
        <div class="soc-grid">
          <a href="https://www.linkedin.com/in/tareqaziz825/" class="soc-btn linkedin" target="_blank" rel="noopener"><i class="fab fa-linkedin"></i> LinkedIn</a>
          <a href="https://github.com/tareqaziz825/" class="soc-btn github" target="_blank" rel="noopener"><i class="fab fa-github"></i> GitHub</a>
          <a href="https://twitter.com/tareqaziz825" class="soc-btn twitter" target="_blank" rel="noopener"><i class="fab fa-x-twitter"></i> Twitter</a>
          <a href="https://www.youtube.com/@TareqAziz825" class="soc-btn youtube" target="_blank" rel="noopener"><i class="fab fa-youtube"></i> YouTube</a>
          <a href="https://www.facebook.com/tareqaziz825/" class="soc-btn facebook" target="_blank" rel="noopener"><i class="fab fa-facebook"></i> Facebook</a>
          <a href="https://www.instagram.com/tareqaziz825/" class="soc-btn instagram" target="_blank" rel="noopener"><i class="fab fa-instagram"></i> Instagram</a>
        </div>

        <p class="c-lbl">Direct contact</p>
        <div class="info-chips">
          <div class="info-chip"><i class="fas fa-envelope"></i><a href="mailto:mohammodtareqaziz@gmail.com">mohammodtareqaziz@gmail.com</a></div>
          <div class="info-chip"><i class="fas fa-envelope"></i><a href="mailto:write2justice@gmail.com">write2justice@gmail.com</a></div>
          <div class="info-chip"><i class="fas fa-phone"></i>+88 01922-667040</div>
          <div class="info-chip"><i class="fas fa-map-marker-alt"></i>Merul Badda, Dhaka-1212, Bangladesh</div>
        </div>
      </div>

      <!-- Right: contact form -->
      <div>
        <p class="c-lbl">Send a message</p>
        <form class="cf" id="contactForm">
          <div class="cf-row">
            <div class="fg">
              <label class="flbl" for="from_name">Your Name</label>
              <input type="text" id="from_name" name="from_name" placeholder="John Doe" required>
            </div>
            <div class="fg">
              <label class="flbl" for="from_email">Your Email</label>
              <input type="email" id="from_email" name="from_email" placeholder="john@email.com" required>
            </div>
          </div>
          <div class="fg">
            <label class="flbl" for="message">Message</label>
            <textarea id="message" name="message" placeholder="Write your message here…" required></textarea>
          </div>
          <button type="submit" class="btn-send" id="sendBtn"><i class="fas fa-paper-plane"></i> Send Message</button>
          <p class="fs" id="formStatus"></p>
        </form>
      </div>

    </div>
  </div>
</section>
